name: smart_class_checkin
description: Smart Class Check-in & Learning Reflection App for university students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Location
  geolocator: ^13.0.1

  # QR Code scanning & generation
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # State management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
